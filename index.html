<body>
    <header>
        <div class="container">
            <nav>
                <a href="" class="brand-logo"> Vaccination.ng </a>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="" class="nav-link active-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="" class="nav-link">Services</a>
                    </li>
                    <li class="nav-item">
                        <a href="" class="nav-link">Schedule</a>
                    </li>
                    <li class="nav-item">
                        <a href="" class="nav-link">Contact Us</a>
                    </li>
                </ul>
                <a href="" class="btn check-status-btn"> Check Status </a>
            </nav>
        </div>
    </header>

    <section class="banner">
        <picture>
            <source media="(max-width:526px)" srcset="assets/image/banner-img-sm.webp" />
            <source media="(max-width:1081px)" srcset="assets/image/banner-img-md.webp" />
            <img src="assets/image/banner-img-lg.webp" alt="" class="banner-img" width="1440" height="1024">
        </picture>
        <div class="container">
            <div class="banner-content">
                <div class="banner-left">
                    <h3 class="section-description">
                        Get Vaccinated. Boost your Immune System
                    </h3>
                    <h2 class="section-heading">
                        COVID-19 Vaccination Got Easier With, <span>Vaccination.ng</span>
                    </h2>
                    <h3 class="section-description light">
                        Vaccination.ng will help you find the nearest centre for vaccination, in all 36 states in
                        Nigeria.
                    </h3>
                    <div class="banner-btns">
                        <a href="" class="btn get-vaccine-btn">Get Vaccine</a>
                        <a href="" class="btn help-center-btn">Help Center</a>
                    </div>
                </div>
                <div class="banner-right">
                    <div class="banner-swiper-container">
                        <div class="swiper">
                            <div class="swiper-wrapper">
                                <div class="swiper-slide">
                                    <img src="assets/image/vaccine-img-md.webp" alt="" class="vaccine-img">
                                </div>
                                <div class="swiper-slide">
                                    <img src="assets/image/vaccine-img-md.webp" alt="" class="vaccine-img">
                                </div>
                            </div>
                        </div>
                        <picture>
                            <source media="(max-width:526px)" srcset="assets/image/swiper-left-sm.webp"/>
                            <img src="assets/image/swiper-left.webp" width="80" height="65" alt="" class="swiper-left-fixed-img">
                        </picture>
                        <img src="assets/image/swiper-right.webp" width="80" height="65" alt=""
                            class="swiper-right-fixed-img">
                    </div>
                </div>
            </div>
        </div>
    </section>
